<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ECharts Agent - 配置</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">EA</div>
      <div class="brand-text">
        <div class="brand-title">ECharts Agent</div>
        <div class="brand-sub">数据可视化对话助手</div>
      </div>
    </div>

    <nav class="nav">
      <a href="/" class="nav-item">💬 对话</a>
      <a href="/config" class="nav-item active">⚙️ 配置</a>
    </nav>

    <div class="sidebar-section grow">
      <div class="section-title">配置说明</div>
      <ul class="tips">
        <li>本应用通过 <b>OpenAI 兼容协议</b>（<code>/chat/completions</code>）调用大模型。</li>
        <li>支持：OpenAI / 智谱 / DeepSeek / 通义 / 月之暗面 / Ollama（需配置 API Key）/ 任何其他兼容端点。</li>
        <li>配置保存在本地 <code>app.db</code>（SQLite）。</li>
        <li>知识库为内置本地文档，不会进行联网搜索。</li>
      </ul>
    </div>
  </aside>

  <main class="main">
    <header class="main-head">
      <div class="head-title">模型与系统配置</div>
      <div class="head-actions">
        <button id="btnTest" class="btn btn-ghost">🔌 测试连接</button>
        <button id="btnSave" class="btn btn-primary">💾 保存</button>
      </div>
    </header>

    <section class="config-form">
      <div class="form-group">
        <label>Base URL <small>以 https:// 或 http:// 开头，结尾不需要 /v1（应用会自动追加 /chat/completions）</small></label>
        <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1" />
      </div>

      <div class="form-group">
        <label>API Key <small>将以明文保存在本地数据库，仅本机使用。</small></label>
        <div class="row">
          <input type="password" id="apiKey" placeholder="sk-..." style="flex:1" />
          <button class="btn btn-ghost" id="btnToggleKey">👁 显示</button>
        </div>
      </div>

      <div class="form-group grid-2">
        <label>模型名称
          <input type="text" id="model" placeholder="gpt-4o-mini / deepseek-chat / qwen-max / ..." />
        </label>
        <label>Temperature
          <input type="number" id="temperature" step="0.1" min="0" max="2" value="0.7" />
        </label>
      </div>

      <div class="form-group">
        <label>最大 Token（max_tokens）
          <input type="number" id="maxTokens" value="2048" />
        </label>
      </div>

      <div class="form-group">
        <label>系统提示词（System Prompt）<small>留空将使用默认。</small></label>
        <textarea id="sysPrompt" rows="6" placeholder="你是一个资深的数据可视化工程师，擅长使用 Apache ECharts…"></textarea>
      </div>

      <div id="testResult" class="hint hidden"></div>
    </section>
  </main>
</div>

<script src="/static/config.js"></script>
</body>
</html>
